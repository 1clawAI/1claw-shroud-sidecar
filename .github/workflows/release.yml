name: Shroud sidecar — Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

env:
  BINARY_NAME: shroud-sidecar

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.3"

      - name: Version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build tarballs
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          build_one() {
            local goos="$1" goarch="$2" suffix="$3"
            local outdir="dist/${BINARY_NAME}_${suffix}"
            mkdir -p "$outdir"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build -trimpath \
              -ldflags="-s -w -X main.version=${VERSION}" \
              -o "$outdir/${BINARY_NAME}" .
            (cd dist && tar -czf "${BINARY_NAME}_${suffix}.tar.gz" "$(basename "$outdir")")
          }
          build_one linux amd64 linux_amd64
          build_one darwin arm64 darwin_arm64
          (cd dist && sha256sum "${BINARY_NAME}"_*.tar.gz | tee checksums.txt)

      - name: GHCR image name (lowercase)
        id: image
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.image.outputs.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/shroud-sidecar_linux_amd64.tar.gz
            dist/shroud-sidecar_darwin_arm64.tar.gz
            dist/checksums.txt
          generate_release_notes: true
