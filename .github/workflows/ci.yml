name: Shroud sidecar — CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.3"

      - name: Test
        run: go test ./...

      - name: Build (release flags)
        run: |
          VERSION="ci-${GITHUB_SHA:0:7}"
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o /tmp/shroud-sidecar .
